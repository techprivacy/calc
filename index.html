<!DOCTYPE html>
<html>
<head>
<title>Smart Browser Calculator</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.calculator{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    text-align:center;
    width:320px;
}

h2{
    margin-bottom:20px;
}

.row{
    display:flex;
    justify-content:center;
    gap:10px;
}

input, select{
    padding:10px;
    font-size:18px;
    border-radius:6px;
    border:1px solid #ccc;
    width:80px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#4facfe;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2d8cf0;
}

#result{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
}

.browser{
    margin-top:10px;
    font-size:14px;
    color:#555;
}

</style>
</head>

<body>

<div class="calculator">

<h2>Smart Calculator</h2>

<div class="row">
<input id="num1" type="number">

<select id="op">
<option value="+">+</option>
<option value="-">−</option>
<option value="*">×</option>
<option value="/">÷</option>
</select>

<input id="num2" type="number">
</div>

<button onclick="calculate()">Calculate</button>

<div id="result"></div>
<div id="browser" class="browser"></div>

</div>

<script>

function detectBrowser(){

let ua = navigator.userAgent;

if(ua.includes("Edg")) return "Edge";
if(ua.includes("Firefox")) return "Firefox";
if(ua.includes("Chrome")) return "Chrome";

return "Other";

}

function calculate(){

let a = Number(document.getElementById("num1").value);
let b = Number(document.getElementById("num2").value);
let op = document.getElementById("op").value;

let browser = detectBrowser();
let result;

if(op=="+") result = a + b;
if(op=="-") result = a - b;
if(op=="*") result = a * b;
if(op=="/") result = a / b;

/* Special behavior for 2+2 */

if(a==2 && b==2 && op=="+"){

    if(browser=="Chrome") result = 4;
    if(browser=="Firefox") result = 5;
    if(browser=="Edge") result = 9;

}

document.getElementById("result").innerHTML = "Result: " + result;
document.getElementById("browser").innerHTML = "Browser Detected: " + browser;

}

</script>

</body>
</html>
